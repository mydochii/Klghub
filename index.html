<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Feed</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    font-family:Arial;
    color:white;
}
.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    padding:10px;
    padding-bottom:70px;
}
.video-card{
    display:flex;
    gap:10px;
    background:#1a1a1a;
    padding:8px;
    border-radius:12px;
    cursor:pointer;
}
.thumb{
    position:relative;
    width:140px;
    flex-shrink:0;
}
.thumb video{
    width:100%;
    height:90px;
    object-fit:cover;
    border-radius:10px;
}
.play-overlay{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:26px;
    background:rgba(0,0,0,0.6);
    border-radius:50%;
    padding:6px 10px;
}
.title{
    font-size:13px;
    color:#ddd;
    line-height:1.3;
}
.navbar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#111;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    border-top:1px solid #222;
}
.navbar div{
    font-size:12px;
    opacity:0.7;
}
.navbar .active{
    opacity:1;
    font-weight:bold;
}
#player{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
    flex-direction:column;
}
#player video{
    width:95%;
    max-width:500px;
}
#closeBtn{
    position:absolute;
    top:15px;
    right:20px;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="app" class="grid"></div>

<div class="navbar">
    <div class="active">Home</div>
    <div>Trending</div>
    <div>Profile</div>
</div>

<div id="player">
    <span id="closeBtn">✕</span>
    <video id="mainVideo" controls playsinline></video>
</div>

<script>
const ad = "https://otieu.com/4/10005133";

const videoList = [
  ["https://cdn2.videy.co/rdWZkm7v1.mp4","M4L4M H3N1NG Y4NG M3MBV4T P1K1R4N L14R"],
  ["https://cdn2.videy.co/leJK1Hid1.mp4","D14M K4M4R D3NG4N SV45N4 Y4NG B3RVB4H"],
  ["https://cdn2.videy.co/1roBnR2w1.mp4","P4ND4NG4N S3J3N4K Y4NG M3NGVB4H R454"],
  ["https://cdn2.videy.co/mpgHad8z1.mp4","K3D3K4T4N P3L4N T4NP4 B4NY4K K4T4"],
  ["https://cdn2.videy.co/tCWUsjnO1.mp4","R454 4N3H Y4NG M3NV54P T1B4 T1B4"],
  ["https://cdn2.videy.co/HmiFAtGq1.mp4","SV45N4 S3P1 Y4NG T3R454 B3R4T"],
  ["https://cdn2.videy.co/u5lLXXf41.mp4","G3R4K K3C1L Y4NG M3MBV4T J4NTVNG B3R4D3G"],
  ["https://cdn2.videy.co/4za41u5h1.mp4","M4L4M P4NJ4NG D3NG4N P1K1R4N K4CV"],
  ["https://cdn2.videy.co/Sj7gCKsB1.mp4","D14M D14M R454 1TV M3NGV4T"],
  ["https://cdn2.videy.co/7dWzdLLH1.mp4","H3N1NG Y4NG M3MBV4T N4P45 J4D1 B3R4T"],
  ["https://cdn2.videy.co/RARMgQ5A1.mp4","P4ND4NG4N D3K4T T4NP4 VJ4R4N"],
  ["https://cdn2.videy.co/18IXgb391.mp4","SV45N4 H4N94T D1 B4L1K K3H3N1NG4N"],
  ["https://cdn2.videy.co/dXTOUt9O1.mp4","R454 T3R53MBVNY1 Y4NG S3M4K1N D3K4T"],
  ["https://cdn2.videy.co/f3PYS3oS1.mp4","M0M3N K3C1L Y4NG M3NGVB4H S3MVSNY4"],
  ["https://cdn2.videy.co/Ur3j4IuY1.mp4","M4L4M 1NV J4D1 K3N4NG4N D14M"]
];

const app = document.getElementById("app");
const player = document.getElementById("player");
const mainVideo = document.getElementById("mainVideo");
const closeBtn = document.getElementById("closeBtn");

videoList.forEach(v => {

    const card = document.createElement("div");
    card.className = "video-card";

    const thumb = document.createElement("div");
    thumb.className = "thumb";

    const vid = document.createElement("video");
    vid.src = v[0];
    vid.muted = true;
    vid.preload = "metadata";
    vid.playsInline = true;

    const play = document.createElement("div");
    play.className = "play-overlay";
    play.innerHTML = "▶";

    thumb.appendChild(vid);
    thumb.appendChild(play);

    const title = document.createElement("div");
    title.className = "title";
    title.innerHTML = v[1];

    card.appendChild(thumb);
    card.appendChild(title);
    app.appendChild(card);

    card.onclick = () => {
        player.style.display = "flex";
        mainVideo.src = v[0];
        mainVideo.currentTime = 0;
        mainVideo.play();

        // IKLAN AWAL (KLIK)
        window.open(ad,"_blank");

        let ad20 = false;
        let ad40 = false;

        mainVideo.ontimeupdate = () => {
            const t = Math.floor(mainVideo.currentTime);

            if(t >= 20 && !ad20){
                ad20 = true;
                window.open(ad,"_blank");
            }

            if(t >= 40 && !ad40){
                ad40 = true;
                window.open(ad,"_blank");
            }
        };
    };
});

closeBtn.onclick = () => {
    mainVideo.pause();
    mainVideo.src = "";
    player.style.display = "none";
};
</script>

</body>
</html>
